<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吸う漢方 MIST</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b1013;
--panel:#11181c;
--line:#24343b;
--muted:#9fb3b8;
--mint:#39bfa2;
--gold1:#fff3c4;
--gold2:#d4af37;
--ink:#2c240d;
}

*{box-sizing:border-box;}

body{
margin:0;
background: radial-gradient(1200px 600px at 50% 0%, #151f24 0%, var(--bg) 60%);
color:#f2f5f5;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

body,.card,.desc,.btext,.name,.hint,.title{
user-select:none;
-webkit-user-select:none;
}

/* LOGO */

.logo{
text-align:center;
padding:38px 16px 8px;
font-family:'Noto Serif JP',serif;
font-size:clamp(28px,6vw,46px);
}

.logo .mist{
font-family:'Montserrat',sans-serif;
font-weight:800;
letter-spacing:6px;
margin-left:12px;
color:#fff;
position:relative;
}

.logo .mist.is-flash{
animation:flashGold .7s ease-out;
}

@keyframes flashGold{
40%{
text-shadow:
0 0 14px rgba(255,215,120,.9),
0 0 40px rgba(212,175,55,.7),
0 0 70px rgba(212,175,55,.4);
}
}

/* ENERGY */

.energy{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:10px 16px 22px;
}

.bar{
width:min(440px,70vw);
height:10px;
background:#1a2328;
border-radius:99px;
overflow:hidden;
}

.fill{
width:0%;
height:100%;
background:linear-gradient(90deg,var(--gold2),var(--gold1));
transition:width .8s ease;
}

/* HERO */

.hero{
text-align:center;
padding:8px 16px 26px;
}

.hero img{
width:100%;
max-width:960px;
border-radius:18px;
box-shadow:0 40px 100px rgba(0,0,0,.6);
}

/* SECTION */

.section{
background:linear-gradient(180deg,var(--panel),#0d1317);
padding:36px 16px 46px;
}

.inner{
max-width:1020px;
margin:0 auto;
}

.character{
text-align:center;
margin-bottom:10px;
}

.character img{
width:150px;
filter:drop-shadow(0 25px 50px rgba(0,0,0,.7));
}

.title{
text-align:center;
font-size:20px;
margin:10px 0 18px;
}

.grid{
display:grid;
gap:14px;
}

.card{
position:relative;
background:linear-gradient(180deg,#182227,#141c20);
border:1px solid var(--line);
border-radius:14px;
padding:14px 16px;
cursor:pointer;
overflow:hidden;
}

.card.is-flash{
box-shadow:0 0 0 1px rgba(212,175,55,.3),0 20px 60px rgba(212,175,55,.25);
}

.name{
font-weight:700;
margin-bottom:8px;
}

.desc{
color:var(--muted);
font-size:14px;
line-height:1.6;
}

.back{
position:absolute;
inset:0;
background:linear-gradient(135deg,#fff9e6,#f0e2bb,#e9d49a);
color:var(--ink);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:16px;
opacity:0;
transition:.3s;
}

.card.active .back{
opacity:1;
}

/* CTA */

.cta{
text-align:center;
padding:40px 16px 70px;
}

.btn{
display:inline-block;
background:linear-gradient(90deg,var(--mint),#2aa48f);
color:#071013;
padding:16px 44px;
font-size:18px;
font-weight:800;
border-radius:999px;
text-decoration:none;
box-shadow:0 20px 60px rgba(57,191,162,.35);
}

</style>
</head>

<body>

<div class="logo">
吸う漢方 <span class="mist" id="mistLogo">MIST</span>
</div>

<div class="energy">
<div class="bar"><div class="fill" id="energyFill"></div></div>
</div>

<section class="hero">
<img src="hero.png">
</section>

<section class="section">
<div class="inner">

<div class="character">
<img src="mist-character.png">
</div>

<div class="title">［注目成分］</div>

<div class="grid">

<div class="card" data-boost="6">
<div class="name">【枸杞子】</div>
<div class="desc">◯ 抗酸化・抗糖化・抗炎症のスーパーフード</div>
<div class="back">● 若さ精力のストック増（精力ホルモンDHEAの消耗防止）</div>
</div>

<div class="card" data-boost="5">
<div class="name">【決明子】</div>
<div class="desc">◯ ビタミンの宝庫、疲れ目・便秘などから目と腸を守る</div>
<div class="back">● ノンストレス勃起</div>
</div>

<div class="card" data-boost="7">
<div class="name">【高麗人参】</div>
<div class="desc">◯ 天然のブースター、自律神経と血流を整える</div>
<div class="back">● 夜のコントロールスイッチ</div>
</div>

<div class="card" data-boost="6">
<div class="name">【黄精】</div>
<div class="desc">◯ 潤いとエネルギーを同時補給する滋養素材</div>
<div class="back">● 体力・体液・潤い増強</div>
</div>

<div class="card" data-boost="8">
<div class="name">【覆盆子】</div>
<div class="desc">◯ 生命エネルギーを蓄える下半身素材</div>
<div class="back">● 精の真打、男女共に下半身の溜め効果</div>
</div>

<div class="card" data-boost="5">
<div class="name">【山楂】</div>
<div class="desc">◯ 血管掃除と消化を助けるポリフェノール素材</div>
<div class="back">● 感度上昇、赤い着火剤</div>
</div>

</div>
</div>
</section>

<section class="cta">

<a class="btn"
href="https://gitorix.github.io/mist-seven-dao/"
target="_blank">

商品を購入する

</a>

</section>

<script>

let energy=18;
const fill=document.getElementById("energyFill");

function setEnergy(v){
energy=Math.max(0,Math.min(100,v));
fill.style.width=energy+"%";
}

window.addEventListener("load",()=>{
setTimeout(()=>setEnergy(72),350);
});

const mistLogo=document.getElementById("mistLogo");

function flashMist(){
mistLogo.classList.remove("is-flash");
void mistLogo.offsetWidth;
mistLogo.classList.add("is-flash");
}

mistLogo.addEventListener("click",flashMist);

const cards=document.querySelectorAll(".card");

let pressTimer;

cards.forEach(card=>{

card.addEventListener("pointerdown",()=>{

const boost=parseInt(card.dataset.boost);
setEnergy(energy+boost);

pressTimer=setTimeout(()=>{
card.classList.add("active");
},600);

});

card.addEventListener("pointerup",()=>{
clearTimeout(pressTimer);
card.classList.remove("active");
});

card.addEventListener("pointerleave",()=>{
clearTimeout(pressTimer);
card.classList.remove("active");
});

});

</script>

</body>
</html>
